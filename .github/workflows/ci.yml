name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macOS because that's the only platform waddle targets; the
    # integration suite runs entirely against the mock duckling/osxphotos
    # doubles, so no Photos library or museum is needed.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
